#
# Configuration file for the subtitle-report script.
#
# WARNING: This file is sourced as Bash code. Do not include untrusted content.
#
# Both settings are OPTIONAL. The script ships with sensible built-in defaults
# (identical to the lists below), so this file only needs to exist if you want
# to change which file extensions are treated as media or as subtitle sidecars.
# Any list left commented out falls back to the built-in default.

# File extensions (case-insensitive) treated as media files to report on.
# Bash array. Edit to add or remove container formats for your library.
MEDIA_EXTS=(
  mkv mp4 m4v avi mov wmv
  mpg mpeg ts m2ts webm
  flv ogv 3gp divx vob
)

# File extensions (case-insensitive) treated as external "sidecar" subtitles.
# A sidecar is matched to a media file when it shares the media file's base
# name, optionally followed by language/flag tokens, e.g.:
#   Movie.srt              -> language: undetermined
#   Movie.en.srt           -> language: en
#   Movie.en.forced.srt    -> language: en (the "forced" token is ignored)
SUBTITLE_EXTS=(
  srt ass ssa sub idx vtt sup
)
