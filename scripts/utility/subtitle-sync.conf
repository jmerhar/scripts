#
# Configuration file for the subtitle-sync script.
#
# WARNING: This file is sourced as Bash code. Do not include untrusted content.
#
# Every setting is OPTIONAL. The script ships with sensible built-in defaults
# (shown commented out below), and command-line flags always take precedence
# over anything set here. Uncomment and edit only what you want to change.

# --- External commands -------------------------------------------------------

# Transcription command (a faster-whisper CLI). Override if it is installed
# under a different name or path (e.g. a wrapper).
# WHISPER_BIN="whisper-ctranslate2"

# Segment-aware subtitle aligner.
# ALASS_BIN="alass"

# faster-whisper compute type. "int8" is fast and light on CPU; "float32" is
# more accurate but slower. On a CUDA GPU, "float16" is typical.
# COMPUTE_TYPE="int8"

# Whisper device: "cpu" (default), "cuda" for an NVIDIA GPU, or "auto".
# DEVICE="cpu"

# Extra arguments appended verbatim to the whisper command (Bash array).
# WHISPER_EXTRA_ARGS=(--vad_filter True)

# --- Defaults for settings that also have command-line flags -----------------
# (Command-line flags override these.)

# Whisper model. ".en" models are English-only; use a multilingual model
# (e.g. "base") together with LANG_DEFAULT for other languages.
# WHISPER_MODEL="base.en"

# Target subtitle language (ISO code or English name).
# LANG_DEFAULT="en"

# alass split penalty; lower values split more aggressively. 4-5 works well for
# ad-break drift; below 3 tends to over-fit.
# SPLIT_PENALTY="5"

# Reference cue granularity (words per line). Finer cues give more accurate
# break localization.
# MAX_WORDS_PER_LINE="8"

# Maximum opening shift (seconds) treated as Whisper onset bias. A larger
# opening shift is kept as a genuine global offset instead of being cancelled.
# ANCHOR_MAX="1.0"

# Suffix appended to the backed-up original subtitle.
# BACKUP_SUFFIX=".bak"

# CPU threads for Whisper/alass. Defaults to the detected core count.
# THREADS="4"

# --- Cache -------------------------------------------------------------------

# Directory for cached Whisper reference subtitles (keyed by video identity and
# transcription parameters). Defaults to ${XDG_CACHE_HOME:-~/.cache}/subtitle-sync.
# CACHE_DIR="/var/cache/subtitle-sync"

# --- File-type discovery -----------------------------------------------------

# Container extensions (case-insensitive) treated as video files when walking a
# directory. Bash array.
# MEDIA_EXTS=(
#   mkv mp4 m4v avi mov wmv
#   mpg mpeg ts m2ts webm
#   flv ogv 3gp divx vob
# )

# Text subtitle extensions (case-insensitive) that can be resynchronized. Bash
# array. Bitmap formats (sup, idx) are intentionally excluded.
# SUBTITLE_EXTS=(
#   srt ass ssa vtt
# )
