#
# Configuration file for the prune-orphaned-torrents script.
#
# WARNING: This file is sourced as Bash code. Do not include untrusted content.
# Because it stores the Deluge password, ensure it is not world-readable
# (e.g., chmod 600, owned by the user that runs the script).
#
# This file defines which directories to scan for orphaned media files, which
# filenames to ignore, and how to reach the Deluge Web UI used to remove the
# corresponding torrents.

# Directories to scan for orphaned files (link count of 1). Bash array; globs
# are expanded when this file is sourced.
#
# Listed explicitly so unrelated *arr apps (readarr, lidarr, ...) are NOT
# matched — add or remove entries to suit your setup.
SCAN_DIRS=(
  /mnt/storage/temp/sonarr
  /mnt/storage/temp/radarr
)

# Filename glob patterns (case-insensitive) to ignore. These are non-media
# "sidecar" files that *arr never hard-links, so they always have a link count
# of 1 and would otherwise look orphaned. Patterns are matched against each
# file's name (e.g. "*sample*" matches anywhere, "*.nfo" matches the extension).
#
# This must list everything that is NOT real media: subtitles, metadata,
# artwork, checksums and OS cruft all have a link count of 1 and would otherwise
# be treated as orphaned "media" and make their torrent a removal candidate. Add
# any further non-media extensions you find in your temp folders.
EXCLUDE_PATTERNS=(
  "*sample*"   # sample clips
  "*.nfo"      # release info
  "*.srt"      # subtitles
  "*.sub"
  "*.idx"
  "*.md5"      # checksums
  "*.sha"
  "*.sfv"
  "*.txt"      # release notes
  "*.jpg"      # artwork
  "*.jpeg"
  "*.png"
  "*.gif"
  "*.url"      # release-site shortcuts
  ".DS_Store"  # macOS / Windows filesystem cruft
  "._*"        # macOS AppleDouble sidecars (e.g. ._.DS_Store, ._movie.mkv)
  "Thumbs.db"
  "*deleted scenes*"  # extras Plex never hard-links into the library
  "*deleted.scenes*"
)

# A media file smaller than this fraction of the torrent's LARGEST media file is
# treated as an "extra" (deleted scenes, release-group advert clips, etc.) and
# ignored when deciding whether a torrent is orphaned. This catches small junk
# files that have no useful name pattern. Set to 0 to disable (then ANY orphaned
# media file, however small, makes its torrent a candidate). Range: 0 to 1.
MIN_MEDIA_RATIO=0.1

# The Deluge Web UI JSON-RPC endpoint (the Web UI must be enabled and reachable)
# and the Web UI password.
DELUGE_URL="http://127.0.0.1:8112/json"
DELUGE_PASSWORD=""

# (Optional) Path translation. Leave empty when Deluge reports the same paths
# the script scans. If Deluge runs in a container and reports container-internal
# paths, set these so a reported path beginning with DELUGE_PATH_PREFIX is
# rewritten to LOCAL_PATH_PREFIX before matching against scanned files.
# Example: DELUGE_PATH_PREFIX="/downloads"  LOCAL_PATH_PREFIX="/mnt/storage/temp"
DELUGE_PATH_PREFIX=""
LOCAL_PATH_PREFIX=""

# (Optional) Path to the log file. If commented out or empty,
# output will only be sent to the console.
# Example: LOG_FILE="/var/log/prune-orphaned-torrents.log"
#LOG_FILE=""
