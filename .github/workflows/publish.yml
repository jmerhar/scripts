# Publishes script releases as Homebrew formulas and Debian packages.
#
# Triggers:
# 1. Release published with a "script-name-vX.Y.Z" tag → packages that script.
# 2. Manual workflow_dispatch → republishes the latest version of all scripts.
name: Publish Script

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout main scripts repo
        uses: actions/checkout@v4
        with:
          path: scripts
          fetch-depth: 0

      - name: Checkout Homebrew tap repo
        uses: actions/checkout@v4
        with:
          repository: jmerhar/homebrew-scripts
          path: homebrew-scripts
          token: ${{ secrets.PAT }}

      - name: Checkout APT repo
        uses: actions/checkout@v4
        with:
          repository: jmerhar/apt-scripts
          path: apt-scripts
          token: ${{ secrets.PAT }}

      - name: Setup Git for multi-repo push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Compile @include directives
        working-directory: scripts
        run: |
          set -e
          echo "--- Compiling @include directives ---"
          while IFS= read -r -d '' script; do
            if grep -q '# @include ' "${script}"; then
              echo "Compiling: ${script}"
              ./bin/compile-includes.sh "${script}" -i
            fi
          done < <(find ./scripts -type f -name '*.sh' -not -path '*/lib/*' -print0)

      - name: Package scripts
        id: package
        working-directory: scripts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Packages a script and uploads its tarball as a release asset.
          # Arguments:
          #   name    - Script name from the manifest
          #   version - Version string (e.g., "v1.3.0")
          #   tag     - Git tag (e.g., "local-backup-v1.3.0")
          package_and_upload() {
            local name="$1"
            local version="$2"
            local tag="$3"

            echo "--- Packaging ${name} ${version} ---"
            ./bin/package-script.sh "${name}" "${version}"

            local tarball="dist/tarballs/scripts-${name}-${version}.tar.gz"
            if [[ -f "${tarball}" ]]; then
              gh release upload "${tag}" "${tarball}" --clobber
            fi
          }

          # --- Single script release (from tag) ---
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "--- Processing release for tag: ${TAG} ---"

            if [[ ! "${TAG}" =~ ^([a-zA-Z0-9_-]+)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "::error::Tag format is invalid. Expected 'script-name-vX.Y.Z', got '${TAG}'."
              exit 1
            fi

            SCRIPT_NAME="${BASH_REMATCH[1]}"
            VERSION="v${BASH_REMATCH[2]}"

            package_and_upload "${SCRIPT_NAME}" "${VERSION}" "${TAG}"

            echo "commit_message=feat(${SCRIPT_NAME}): Release version ${VERSION}" >> $GITHUB_OUTPUT
          fi

          # --- Republish all scripts (manual trigger) ---
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "--- Republishing latest version of all scripts ---"

            while IFS= read -r name; do
              latest_tag=$(git tag --list "${name}-v*" --sort=-v:refname | head -n 1)
              if [[ -z "${latest_tag}" ]]; then
                echo "--- Skipping ${name}: no version tags found ---"
                continue
              fi

              version=$(echo "${latest_tag}" | grep -o 'v[0-9]\+\.[0-9]\+\.[0-9]\+')
              package_and_upload "${name}" "${version}" "${latest_tag}"
            done < <(yq eval '.scripts | keys | .[]' scripts.yaml)

            echo "commit_message=chore: Republish latest version of all scripts" >> $GITHUB_OUTPUT
          fi

      - name: Move artifacts to repositories
        if: success() && (steps.package.outputs.commit_message != '')
        run: |
          if [ -d "scripts/dist/homebrew" ]; then
            mv scripts/dist/homebrew/*.rb homebrew-scripts/Formula/
          fi
          if [ -d "scripts/dist/debian" ]; then
            mv scripts/dist/debian/*.deb apt-scripts/pool/main/
          fi

      - name: Commit and push Homebrew changes
        if: success() && (steps.package.outputs.commit_message != '')
        working-directory: scripts
        run: |
          cd ../homebrew-scripts
          ../scripts/bin/update-readme-table.sh README.md "Formula"
          git add .
          git commit -m "${{ steps.package.outputs.commit_message }}" || echo "No Homebrew changes to commit."
          for attempt in 1 2 3; do
            git push && break
            echo "Push failed (attempt ${attempt}/3), rebasing..."
            git pull --rebase
          done

      - name: Sign and commit APT repository changes
        if: success() && (steps.package.outputs.commit_message != '')
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        working-directory: scripts
        run: |
          cd ../apt-scripts
          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import --passphrase "$GPG_PASSPHRASE"
          # Generate package files
          apt-ftparchive packages pool/ > dists/stable/main/binary-all/Packages
          gzip -c dists/stable/main/binary-all/Packages > dists/stable/main/binary-all/Packages.gz
          # Generate release file (remove old one first to prevent self-referencing checksum)
          rm -f dists/stable/Release dists/stable/InRelease
          apt-ftparchive -c apt-ftparchive.conf release dists/stable/ > dists/stable/Release
          test -s dists/stable/Release || (echo "::error::Failed to generate valid Release file." && exit 1)
          # Sign the release file
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --default-key "jmerhar-bot" --clearsign -o dists/stable/InRelease dists/stable/Release
          # Update README table
          ../scripts/bin/update-readme-table.sh README.md "Package"
          # Commit and push
          git add .
          git commit -m "${{ steps.package.outputs.commit_message }}" || echo "No APT changes to commit."
          for attempt in 1 2 3; do
            git push && break
            echo "Push failed (attempt ${attempt}/3), rebasing..."
            git pull --rebase
          done
