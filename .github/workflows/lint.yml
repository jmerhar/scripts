name: Lint

on:
  push:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on all shell scripts
        run: |
          find . -name '*.sh' -not -path './dist/*' -print0 \
            | xargs -0 shellcheck --severity=warning

  perl-syntax:
    name: Perl syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Perl syntax
        run: |
          find . -name '*.pl' -print0 \
            | xargs -0 -I{} perl -c {}

  smoke-test:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run package-script against each publishable script
        run: |
          . test_env.sh
          # Compile @include directives before smoke-testing
          while IFS= read -r -d '' script; do
            if grep -q '# @include ' "${script}"; then
              echo "--- Compiling: ${script} ---"
              ./bin/compile-includes.sh "${script}" -i
            fi
          done < <(find ./scripts -type f -name '*.sh' -not -path '*/lib/*' -print0)
          find ./scripts -mindepth 2 -type f -not -path '*/lib/*' | while read script_path; do
            # Skip non-scripts
            head -n 1 "${script_path}" | grep -qE '^#!' || continue

            echo "--- Smoke-testing: ${script_path} ---"
            ./bin/package-script.sh "${script_path}"
          done

      - name: Verify output artifacts exist
        run: |
          test -d dist/homebrew && ls dist/homebrew/*.rb
          test -d dist/debian && ls dist/debian/*.deb
