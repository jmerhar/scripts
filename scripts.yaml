defaults:
  author: "Jure Merhar <dev@merhar.si>"
  homepage: "https://github.com/jmerhar/scripts"
  license: "MIT"

scripts:
  local-backup:
    path: scripts/system/local-backup.sh
    description: "A generic script to create and automatically prune rsync-based system backups."
    dependencies:
      common: [rsync]

  prune-orphaned-torrents:
    path: scripts/system/prune-orphaned-torrents.sh
    description: "Finds orphaned media files left by *arr hard-linking and interactively removes the corresponding torrents from Deluge."
    dependencies:
      common: [curl, jq]

  nopasswd-sudo:
    path: scripts/system/nopasswd-sudo.sh
    description: "Toggles temporary passwordless sudo for a user, with an in-session auto-revoke timer and a boot-time safety net so it never stays enabled by accident."
    platforms: [debian]   # systemd/sudoers tool — not applicable to Homebrew/macOS
    dependencies:
      debian: [sudo]

  photo-backup:
    path: scripts/photography/photo-backup.sh
    description: "A robust script for backing up photo collections from multiple sources to a remote server using rsync."
    dependencies:
      common: [rsync]

  remove-sidecars:
    path: scripts/photography/remove-sidecars.sh
    description: 'A script to find and delete "sidecar" files when a corresponding RAW photo file exists.'

  compare-dirs:
    path: scripts/utility/compare-dirs.sh
    description: "Recursively compares two directories and reports differences in existence, size, timestamps, and checksums."

  dmarc-report:
    path: scripts/utility/dmarc-report.sh
    description: "Aggregates a folder of DMARC RUA reports (.xml.gz/.zip) into one overall report, tracking policy changes over time and flagging unenforced domains, unaligned senders, DNS/DKIM errors, and spoofing (grouped into subnets with per-range country lookup)."
    dependencies:
      common: [curl, jq]            # curl+jq: best-effort country lookup for failing ranges
      homebrew: [libxml2]           # provides xmllint (unzip/gzip ship with macOS)
      debian: [libxml2-utils, unzip]

  subtitle-report:
    path: scripts/utility/subtitle-report.sh
    description: "Reports on subtitle coverage for a media library, detecting embedded tracks and sidecar files and breaking down counts by language and source."
    dependencies:
      common: [ffmpeg]

  subtitle-sync:
    path: scripts/utility/subtitle-sync.sh
    description: "Resynchronizes drifting subtitles to a video's speech using a Whisper transcript as reference and alass for segment-aware alignment (handles ad-break, global-offset, and speed drift). Requires the external tools 'alass' and 'whisper-ctranslate2' on PATH."
    dependencies:
      common: [ffmpeg]

  unlock-pdf:
    path: scripts/utility/unlock-pdf.sh
    description: "Decrypts a password-protected PDF file using the 'qpdf' command-line tool."
    dependencies:
      common: [qpdf]
